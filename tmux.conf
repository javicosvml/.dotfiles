# Unified tmux configuration for tmux 3.4+
# Optimized with native tmux syntax
# Last updated: 2025-12-11
#
# Color scheme: TokyoNight Night
#   #1a1b26 - Background (dark blue-black)
#   #565f89 - Comment gray (inactive borders, secondary text)
#   #c0caf5 - Foreground (primary text)
#   #7aa2f7 - Blue (active borders, accents)
#   #7dcfff - Cyan (active window, highlights)
#   #9ece6a - Green (success indicators)

# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================

# Terminal configuration
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",gnome*:RGB"

# Enable extended keys for modern terminals (tmux 3.2+)
# Supports modifier keys like C-Up, M-PageUp, etc.
set -g extended-keys on

# Performance and responsiveness
set -s escape-time 10                     # faster command sequences
set -sg repeat-time 600                   # increase repeat timeout
set -s focus-events on

# GNU-Screen compatible prefix
set -g prefix2 C-a
bind C-a send-prefix -2

# History and buffer
set -g history-limit 50000                # boost history

# Mouse support (tmux 2.1+)
set -g mouse on                           # enable mouse support for scrolling, selecting panes, resizing

# Mouse wheel scrolling in copy mode
bind -T copy-mode-vi WheelUpPane send -X scroll-up
bind -T copy-mode-vi WheelDownPane send -X scroll-down

# Mouse shortcuts (double-click, triple-click) - configured per platform below
# These bindings are set in the clipboard section for platform-specific commands

# ==============================================================================
# DISPLAY AND APPEARANCE
# ==============================================================================

# Window and pane numbering
set -g base-index 1                       # start windows numbering at 1
setw -g pane-base-index 1                 # make pane numbering consistent with windows

# Window management
setw -g automatic-rename on               # rename window to reflect current program
set -g renumber-windows on                # renumber windows when a window is closed

# Terminal title
set -g set-titles on
set -g set-titles-string '#h | #S | #I #W'

# Display timers
set -g display-panes-time 2000            # pane indicators display time
set -g display-time 1500                  # status messages display time
set -g status-interval 10                 # redraw status line every 10 seconds

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off

# ==============================================================================
# COLOR SCHEME AND STYLING - TokyoNight Night
# ==============================================================================

# Pane borders
set -g pane-border-style "fg=#565f89"
set -g pane-active-border-style "fg=#7aa2f7"

# Pane display indicators (when you hit <prefix> + q)
set -g display-panes-colour "#c0caf5"
set -g display-panes-active-colour "#7dcfff"

# Message style (status line messages)
set -g message-style "fg=#1a1b26,bg=#7dcfff,bold"
set -g message-command-style "fg=#7dcfff,bg=#1a1b26,bold"

# Mode style (copy mode, etc.)
setw -g mode-style "fg=#1a1b26,bg=#c0caf5,bold"

# Clock style (when you hit <prefix> + t)
setw -g clock-mode-colour "#7aa2f7"
setw -g clock-mode-style 24

# ==============================================================================
# STATUS BAR CONFIGURATION - TokyoNight Night
# ==============================================================================

# Status bar position and style
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#c0caf5,bg=#1a1b26"

# Status left: Session name and window count
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7dcfff,bold] 🦊 #S #[fg=#7dcfff,bg=#1a1b26]#[fg=#c0caf5,bg=#1a1b26] "

# Status right: Indicators, time, date, user, and host
set -g status-right-length 80
set -g status-right "#[fg=#c0caf5,bg=#1a1b26]#{?client_prefix,#[fg=#7dcfff]⌨ ,}#{?pane_synchronized,#[fg=#565f89]🔒 ,}#[fg=#c0caf5]%H:%M #[fg=#565f89]| #[fg=#c0caf5]%d-%b #[fg=#565f89]| #[fg=#7dcfff]#(whoami) #[fg=#565f89]@ #[fg=#7dcfff]#h "

# Window status format (inactive windows)
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I #W "
setw -g window-status-style "fg=#565f89,bg=#1a1b26"

# Window status format (current/active window)
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W "
setw -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7,bold"

# Window status - activity
setw -g window-status-activity-style "fg=#c0caf5,bg=default,underscore"

# Window status - bell
setw -g window-status-bell-style "fg=#9ece6a,bg=default,blink,bold"

# Window status - last
setw -g window-status-last-style "fg=#c0caf5,bg=default"

# Separator between windows
setw -g window-status-separator ""

# ==============================================================================
# KEY BINDINGS
# ==============================================================================

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Configuration reloaded!"

# Edit configuration
bind e new-window -n "~/.tmux.conf" sh -c '${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display "Configuration reloaded!"'

# Session management
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# Window splitting (retain current path)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# Pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Window navigation
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Toggle mouse mode
bind m run-shell "tmux set -g mouse $(tmux show -gv mouse | grep -q on && echo off || echo on) && tmux display 'Mouse: '$(tmux show -gv mouse)"

# ==============================================================================
# COPY MODE (VI-STYLE)
# ==============================================================================

bind Enter copy-mode

# Vi-style key bindings in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# Copy to system clipboard (multi-platform support)
# macOS clipboard (optimized for this system)
if -b 'command -v pbcopy > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | pbcopy"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "pbcopy"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "pbcopy"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
}

# macOS with reattach-to-user-namespace (fallback)
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | reattach-to-user-namespace pbcopy"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "reattach-to-user-namespace pbcopy"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"
}

# X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | xsel -i -b"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xsel -i -b"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xsel -i -b"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xsel -i -b"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xsel -i -b"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(xsel -o -b)\"; tmux paste-buffer"
}

if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -i -selection clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -i -selection clipboard"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "xclip -i -selection clipboard"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "xclip -i -selection clipboard"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(xclip -o -selection clipboard)\"; tmux paste-buffer"
}

# Wayland clipboard
if -b 'command -v wl-copy > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | wl-copy"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "wl-copy"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "wl-copy"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(wl-paste)\"; tmux paste-buffer"
}

# Windows clipboard (WSL)
if -b 'command -v clip.exe > /dev/null 2>&1' {
    bind y run-shell "tmux save-buffer - | clip.exe"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "clip.exe"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "clip.exe"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(powershell.exe Get-Clipboard)\"; tmux paste-buffer"
}

if -b '[ -c /dev/clipboard ]' {
    bind y run-shell "tmux save-buffer - > /dev/clipboard"
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "cat > /dev/clipboard"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "cat > /dev/clipboard"
    bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; send -X copy-pipe-no-clear "cat > /dev/clipboard"
    bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; send -X copy-pipe-no-clear "cat > /dev/clipboard"
    bind -n MouseDown3Pane run-shell "tmux set-buffer \"$(cat /dev/clipboard)\"; tmux paste-buffer"
}

# ==============================================================================
# BUFFER MANAGEMENT
# ==============================================================================

bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# ==============================================================================
# CUSTOMIZATION SECTION
# ==============================================================================
# Add your personal customizations below this line
# This section is preserved when updating the base configuration

# Example customizations:
# set -g status-position top
# bind C-x kill-pane

# ==============================================================================
# NEOVIM INTEGRATION
# ==============================================================================
# Smart pane switching with awareness of Neovim splits
# Works with vim-tmux-navigator plugin
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# ==============================================================================
# TMUX PLUGIN MANAGER (TPM)
# ==============================================================================
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-resurrect settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh psql mysql sqlite3 irb pry node'

# tmux-continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank settings (improved clipboard)
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# EOF
