# ============================================================================
# TMUX Configuration - Optimized for tmux 3.5+ and macOS
# ============================================================================
# Modern, clean tmux configuration with sensible defaults
# For customization, edit ~/.tmux.conf.local

# -- General Settings ---------------------------------------------------------

# Shell configuration
set -g default-shell /bin/zsh
set -g default-command /bin/zsh

# Terminal settings - proper color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",xterm-kitty:Tc"
set -as terminal-features ",*:RGB"

# Performance optimizations
set -s escape-time 0                    # Eliminate ESC key delay
set -g repeat-time 600                  # Increase key repeat timeout
set -s focus-events on                  # Enable focus events
set -g aggressive-resize on             # Smart window resizing

# History and scrollback
set -g history-limit 50000              # Large scrollback buffer

# Window and pane numbering
set -g base-index 1                     # Start windows at 1
setw -g pane-base-index 1               # Start panes at 1
set -g renumber-windows on              # Renumber windows on close

# Display settings
setw -g automatic-rename on             # Auto-rename windows
set -g set-titles on                    # Set terminal title
set -g set-titles-string '#h ❐ #S ● #I #W'

# Activity monitoring
set -g monitor-activity on
set -g visual-activity off

# Status bar refresh
set -g status-interval 5                # Update status every 5 seconds

# -- Key Bindings -------------------------------------------------------------

# Prefix keys
set -g prefix C-b                       # Default prefix
set -g prefix2 C-a                      # Secondary prefix (GNU Screen compatible)
bind C-a send-prefix -2
bind C-b send-prefix

# Reload configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Edit configuration
bind e new-window -n "tmux.conf" "sh -c '\${EDITOR:-nvim} ~/.tmux.conf.local && tmux source ~/.tmux.conf'"

# Display times
set -g display-panes-time 2000          # Pane numbers display time
set -g display-time 1500                # Status messages display time

# -- Mouse Support ------------------------------------------------------------

set -g mouse on

# -- Window Management --------------------------------------------------------

# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# New window with current path
bind c new-window -c "#{pane_current_path}"

# -- Pane Navigation ----------------------------------------------------------

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Pane swapping
bind > swap-pane -D
bind < swap-pane -U

# -- Window Navigation --------------------------------------------------------

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# Window swapping
bind -r "<" swap-window -t -1 -d
bind -r ">" swap-window -t +1 -d

# -- Copy Mode ----------------------------------------------------------------

# Enter copy mode
bind Enter copy-mode
bind Escape copy-mode

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# macOS clipboard integration
if-shell "command -v pbcopy" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
}

# -- Session Management -------------------------------------------------------

bind C-c new-session
bind C-f command-prompt -p "find-session:" "switch-client -t %%"
bind BTab switch-client -l

# -- Buffer Management --------------------------------------------------------

bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

# -- Status Bar ---------------------------------------------------------------

set -g status on
set -g status-position bottom
set -g status-justify left

# Status bar colors (default - override in ~/.tmux.conf.local)
set -g status-style "fg=#d8dee9,bg=#2e3440"

# Left status
set -g status-left-length 50
set -g status-left " #[bold]#S #[nobold]| "

# Right status
set -g status-right-length 100
set -g status-right "#{?client_prefix,#[reverse]<Prefix>#[noreverse] ,}#(whoami)@#h | %H:%M %d-%b-%y "

# Window status
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #[bold]#I:#W#[nobold] "
setw -g window-status-current-style "fg=#2e3440,bg=#88c0d0,bold"
setw -g window-status-style "fg=#d8dee9,bg=#3b4252"
setw -g window-status-separator ""

# Activity window
setw -g window-status-activity-style "fg=#a3be8c,bold"
setw -g window-status-bell-style "fg=#bf616a,bold,blink"

# Pane borders
set -g pane-border-style "fg=#4c566a"
set -g pane-active-border-style "fg=#88c0d0"

# Message style
set -g message-style "fg=#2e3440,bg=#88c0d0,bold"
set -g message-command-style "fg=#88c0d0,bg=#2e3440"

# Mode style (copy mode, etc)
setw -g mode-style "fg=#2e3440,bg=#88c0d0,bold"

# Pane number display
set -g display-panes-active-colour "#88c0d0"
set -g display-panes-colour "#4c566a"

# Clock mode
setw -g clock-mode-colour "#88c0d0"
setw -g clock-mode-style 24

# -- Additional Bindings ------------------------------------------------------

# Synchronize panes
bind S setw synchronize-panes

# Clear screen and scrollback
bind C-l send-keys C-l \; clear-history

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Toggle mouse mode
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# -- Load Local Configuration -------------------------------------------------

# Source local configuration file if it exists
# Use this file for personal customizations
if-shell "[ -f ~/.tmux.conf.local ]" "source ~/.tmux.conf.local"

# EOF
#
# Tips:
# - Press <prefix> + ? to see all key bindings
# - Press <prefix> + r to reload configuration
# - Press <prefix> + e to edit local configuration
# - Press <prefix> + m to toggle mouse mode
