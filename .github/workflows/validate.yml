name: Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run ShellCheck on shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          scandir: ./scripts
          severity: warning

  validate-configs:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install zsh and tmux
        run: |
          sudo apt-get update -q
          sudo apt-get install -y zsh tmux
          tmux -V

      - name: Validate tmux config syntax
        run: |
          mkdir -p "$HOME/.tmux/plugins"
          git clone --depth=1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm" 2>/dev/null || true
          tmux new-session -d -s ci 2>/dev/null || true
          tmux source-file "$(pwd)/tmux.conf" && echo "tmux.conf OK"

      - name: Validate ZSH module syntax
        run: |
          for f in zsh.d/*.zsh; do
            zsh -n "$f" && echo "OK: $f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: Validate zshrc syntax
        run: |
          zsh -n zshrc && echo "OK: zshrc"

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v19.1.0
        with:
          globs: |
            **/*.md
            !.opencode/**/*.md
          config: .markdownlint.yml
