name: Validate macOS

on:
  pull_request:
    branches: [main]
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: macOS Config Validation
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      # ── Install tools ──────────────────────────────────────────────────────
      - name: Install tools
        run: |
          brew install tmux neovim kitty mise
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      # ── Symlink configs ────────────────────────────────────────────────────
      - name: Symlink configs
        run: |
          ln -sf "$GITHUB_WORKSPACE/zshrc"           "$HOME/.zshrc"
          ln -sf "$GITHUB_WORKSPACE/zsh.d"           "$HOME/.zsh.d"
          ln -sf "$GITHUB_WORKSPACE/tmux.conf"       "$HOME/.tmux.conf"
          ln -sf "$GITHUB_WORKSPACE/gitignore_global" "$HOME/.gitignore_global"
          mkdir -p "$HOME/.config/kitty"
          ln -sf "$GITHUB_WORKSPACE/kitty.conf"      "$HOME/.config/kitty/kitty.conf"
          mkdir -p "$HOME/.config"
          ln -sf "$GITHUB_WORKSPACE/nvim"            "$HOME/.config/nvim"
          echo "Symlinks created:"
          ls -la "$HOME/.zshrc" "$HOME/.zsh.d" "$HOME/.tmux.conf" "$HOME/.config/nvim"

      # ── ZSH: syntax ────────────────────────────────────────────────────────
      - name: "[ZSH] Syntax check"
        run: |
          echo "Checking zshrc..."
          zsh -n "$HOME/.zshrc"
          echo "Checking 11 modules in zsh.d/..."
          failed=0
          for f in zsh.d/*.zsh; do
            if zsh -n "$f" 2>/dev/null; then
              echo "  OK  $f"
            else
              echo "  FAIL $f"
              failed=$((failed + 1))
            fi
          done
          [ $failed -eq 0 ] && echo "ZSH syntax OK" || { echo "$failed module(s) failed"; exit 1; }

      # ── ZSH: startup time ─────────────────────────────────────────────────
      - name: "[ZSH] Startup time"
        run: |
          # Pre-install zinit so startup time reflects real usage, not first-clone overhead
          ZINIT_HOME="$HOME/.local/share/zinit/zinit.git"
          git clone --depth=1 https://github.com/zdharma-continuum/zinit.git "$ZINIT_HOME" 2>/dev/null
          echo "Measuring ZSH startup (3 runs)..."
          times=()
          for i in 1 2 3; do
            ms=$({ time zsh -i -c exit; } 2>&1 | grep real | awk '{print $2}' | sed 's/[ms]/ /g' | awk '{print int($1*60000 + $2*1000)}')
            times+=("$ms")
            echo "  Run $i: ${ms}ms"
          done
          total=0
          for t in "${times[@]}"; do total=$((total + t)); done
          mean=$((total / 3))
          echo "Mean: ${mean}ms (threshold: 500ms)"
          echo "STARTUP_MEAN=${mean}" >> "$GITHUB_ENV"
          [ $mean -le 500 ] && echo "ZSH startup OK" || echo "WARNING: startup time ${mean}ms > 500ms threshold"

      - name: "[ZSH] Comment startup time on PR"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const mean = process.env.STARTUP_MEAN || 'n/a';
            const ok = parseInt(mean) <= 500;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ZSH Startup Time\n| Metric | Value |\n|--------|-------|\n| Mean (3 runs) | ${mean}ms |\n| Threshold | 500ms |\n| Status | ${ok ? '✅ OK' : '⚠️ Over threshold'} |`
            });

      # ── TMUX ──────────────────────────────────────────────────────────────
      - name: "[TMUX] Validate config"
        run: |
          mkdir -p "$HOME/.tmux/plugins"
          git clone --depth=1 https://github.com/tmux-plugins/tpm "$HOME/.tmux/plugins/tpm" 2>/dev/null || true
          tmux new-session -d -s ci 2>/dev/null || true
          tmux source-file "$HOME/.tmux.conf"
          echo "TMUX config OK"

      # ── Kitty ─────────────────────────────────────────────────────────────
      - name: "[Kitty] Validate config"
        run: |
          if kitty --check-config 2>&1; then
            echo "Kitty config OK"
          else
            echo "Kitty: config check skipped (headless CI — expected without GPU/display)"
          fi

      # ── Neovim ────────────────────────────────────────────────────────────
      - name: "[Nvim] Validate config"
        run: |
          nvim --headless "+qa" 2>&1
          echo "Neovim config OK (exit $?)"

      # ── Mise ──────────────────────────────────────────────────────────────
      - name: "[Mise] Validate"
        run: |
          mise --version
          mise doctor || true
          echo "Mise OK"

      # ── macOS Security ────────────────────────────────────────────────────
      - name: "[macOS] Security checks"
        run: |
          echo "=== SIP Status ==="
          csrutil status 2>&1 || echo "Note: SIP status unavailable outside Recovery"
          echo "=== Gatekeeper Status ==="
          spctl --status 2>&1 || echo "Note: Gatekeeper status unavailable"
          echo "macOS security checks complete"

      # ── Summary ───────────────────────────────────────────────────────────
      - name: GitHub Step Summary
        if: always()
        run: |
          echo "## macOS Config Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | Check |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| ZSH | Syntax (zshrc + 11 modules) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ZSH | Startup time (mean: ${STARTUP_MEAN:-n/a}ms, threshold 500ms) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| TMUX | \`tmux source-file\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Kitty | \`kitty --check-config\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Neovim | \`nvim --headless +qa\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mise | \`mise doctor\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| macOS | SIP + Gatekeeper status |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Runner: \`macos-latest\` (GitHub-hosted, on-demand)" >> "$GITHUB_STEP_SUMMARY"
