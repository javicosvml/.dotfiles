# =============================================================================
# Kitty Terminal Configuration - 2025 Enhanced Edition
# Modern glassmorphism aesthetic with TokyoNight Night theme
# Optimized for macOS with transparency, blur, and premium visual effects
# =============================================================================

# =============================================================================
# Fonts - Premium Typography
# =============================================================================
font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        13.0

# Font features - Enable ligatures for modern code aesthetics
# Ligatures make code more readable with combined characters (=>, !=, >=, etc.)
disable_ligatures never
font_features none

# Adjust line height for better readability and spacious feel
modify_font cell_height 120%

# Font rendering - slightly bolder text for better contrast on transparent backgrounds
# Increase if text feels thin against blur, decrease if too bold
modify_font cell_width 100%

# =============================================================================
# 2025 Visual Effects - Glassmorphism & Transparency
# =============================================================================

# Background transparency - 0.93 provides perfect balance of:
# - Stunning glass effect with background blur
# - Excellent text readability
# - Modern, premium aesthetic
# Adjust: 0.85-0.90 for more transparency, 0.95-1.0 for less
background_opacity 0.93

# Background blur - creates frosted glass effect (macOS only)
# 50 provides optimal blur without losing too much context
# Adjust: 30-40 for subtle blur, 60-80 for heavier frosting
background_blur 50

# Dynamic opacity - allows temporary opacity changes via shortcuts
# Use cmd+shift+a (custom binding below) to toggle transparency on the fly
dynamic_background_opacity yes

# Dim inactive windows - creates focus by fading background windows
# 0.75 provides noticeable but not distracting dimming
# Adjust: 0.80-0.85 for subtle, 0.60-0.70 for dramatic
dim_opacity 0.75

# =============================================================================
# Color Scheme - TokyoNight Night (Preserved Original Theme)
# https://github.com/folke/tokyonight.nvim
# Your beautiful dark blue theme - untouched perfection
# =============================================================================

# Basic colors
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c

# Cursor colors - Enhanced with subtle glow effect via theme colors
cursor #c0caf5
cursor_text_color #1a1b26

# URL color - Bright cyan for excellent visibility
url_color #73daca

# Window border colors - Modern accent colors with theme consistency
active_border_color #7aa2f7
inactive_border_color #292e42
bell_border_color #e0af68

# Tab bar colors - Sleek integration with theme
active_tab_foreground #1a1b26
active_tab_background #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #292e42
tab_bar_background #15161e

# Normal colors - TokyoNight palette
color0 #15161e
color1 #f7768e
color2 #9ece6a
color3 #e0af68
color4 #7aa2f7
color5 #bb9af7
color6 #7dcfff
color7 #a9b1d6

# Bright colors
color8 #414868
color9 #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Extended colors
color16 #ff9e64
color17 #db4b4b

# =============================================================================
# Cursor - Modern Smooth Animation
# =============================================================================

# Block cursor for visibility and modern feel
cursor_shape block

# Smooth cursor blinking - 550ms provides gentle, non-distracting pulse
# Creates a living, breathing terminal aesthetic
# Set to 0 to disable blinking (original behavior)
# Adjust: 400-500 for faster pulse, 600-800 for slower
cursor_blink_interval 550

# Stop blinking after 15s of inactivity to reduce distraction
cursor_stop_blinking_after 15.0

# Cursor beam customization - macOS only
# Creates a more precise, modern cursor appearance
cursor_beam_thickness 1.8

# Cursor underline thickness for underline cursor shape
cursor_underline_thickness 2.0

# =============================================================================
# Scrollback
# =============================================================================
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# Smooth scrolling - reduces jarring jumps, creates fluid experience
# Requires recent Kitty version (0.30.0+)
scrollback_fill_enlarged_window yes

# =============================================================================
# Mouse - Enhanced Interaction
# =============================================================================
mouse_hide_wait 3.0

# URL styling - curly underline for modern, unobtrusive link indication
url_style curly

open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes

# Copy on select - immediate clipboard access (can disable for traditional behavior)
copy_on_select yes

strip_trailing_spaces smart
select_by_word_characters @-./_~?&=%+#

# Click actions
mouse_map left click ungrabbed mouse_handle_click selection link prompt
mouse_map shift+left click grabbed,ungrabbed mouse_handle_click selection link prompt
mouse_map ctrl+shift+left release grabbed,ungrabbed mouse_handle_click link

# =============================================================================
# Performance - Optimized for Smooth Animations
# =============================================================================

# Repaint delay - 10ms for smooth rendering with transparency
repaint_delay 10

# Input delay - 3ms for responsive typing
input_delay 3

# Sync to monitor - prevents tearing with transparency effects
sync_to_monitor yes

# =============================================================================
# Bell - Visual Feedback Without Audio
# =============================================================================
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab "🔔 "

# =============================================================================
# Window Layout - Premium Spacing & Modern Aesthetics
# =============================================================================
remember_window_size  yes
initial_window_width  1200
initial_window_height 700

# Window padding - increased to 12 for spacious, premium feel
# Creates breathing room around text, enhances glass effect
# Adjust: 8-10 for compact, 14-20 for extra spacious
window_padding_width 12

# Window margins - space between split windows
# 2 creates subtle separation with modern minimalism
window_margin_width 2

# Single window margin - use same as multi-window for consistency
single_window_margin_width 2

# Window placement
placement_strategy center

# Window border - subtle but visible separation
# 1pt provides clear delineation without being heavy
window_border_width 1pt

# Minimal borders - clean, modern appearance
draw_minimal_borders yes

# Inactive text alpha - fade inactive splits for better focus
# 0.8 provides noticeable but readable dimming
# Adjust: 0.85-0.90 for subtle, 0.70-0.75 for dramatic
inactive_text_alpha 0.8

# Window resize animations - smooth, fluid transitions
# Creates premium feel when adjusting layouts
resize_debounce_time 0.1
resize_in_steps no

# Confirm close - prevents accidental window closure
confirm_os_window_close 1

# =============================================================================
# Tab Bar - Modern Minimalist Design
# =============================================================================

# Tab bar position - top for traditional feel, bottom for modern iOS-like aesthetic
tab_bar_edge top

# Tab margins - 2pt creates breathing room
tab_bar_margin_width 2.0

# Vertical margin - slight padding for floating appearance
# 2pt top, 0pt bottom creates subtle elevation effect
tab_bar_margin_height 2.0 0.0

# Tab style - fade for modern, seamless integration
# Options: fade (modern gradient), powerline (your original), separator, hidden
# fade creates smooth color transitions between tabs
tab_bar_style fade

# Tab alignment
tab_bar_align left

# Show tabs when - 2+ tabs for clean single-tab experience
tab_bar_min_tabs 2

# Tab title template - clean, informative format
# Shows index, bell/activity indicators, and title
tab_title_template " {fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title} "

# Active tab template - can customize differently (none uses default)
active_tab_title_template none

# Tab font styles - bold active for clear focus
active_tab_font_style   bold-italic
inactive_tab_font_style normal

# Tab fade - smooth transitions (fade style only)
# 0.3 creates visible but not overwhelming fade gradient
tab_fade 0.3

# =============================================================================
# macOS Specific Settings - Native Integration
# =============================================================================

# Hide window decorations - titlebar-only for clean, native appearance
hide_window_decorations titlebar-only

# Titlebar color - matches background for seamless integration
macos_titlebar_color background

# Option key behavior - no alt for standard macOS behavior
macos_option_as_alt no

# Quit behavior - clean exit when last window closes
macos_quit_when_last_window_closed yes

# Window title location - in window for better context
macos_show_window_title_in window

# Font rendering - 0.1 slightly thickens for better readability on Retina
# Adjust: 0.0 for standard, 0.2 for bolder (useful with transparency)
macos_thicken_font 0.1

# Display settings
# Traditional fullscreen = no for modern, fluid transitions
macos_traditional_fullscreen no

# Custom beam cursor - more precise, native macOS appearance
macos_custom_beam_cursor yes

# Color space - displayp3 for wider color gamut on modern Macs
# Provides richer, more vibrant colors
macos_colorspace displayp3

# Window chrome - modern translucent effect (macOS 10.14+)
# Creates additional glass effect in titlebar
# Options: default, light, dark, transparent
# transparent provides maximum glass effect
macos_window_resizable yes

# =============================================================================
# Keyboard Shortcuts - macOS Native
# =============================================================================
kitty_mod cmd

# Clipboard
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+shift+v paste_from_selection

# Window management
map cmd+n new_os_window
map cmd+w close_window
map cmd+enter new_window
map cmd+] next_window
map cmd+[ previous_window
map cmd+shift+] move_window_forward
map cmd+shift+[ move_window_backward

# Window resizing - new shortcuts for layout control
map cmd+shift+equal resize_window taller
map cmd+shift+minus resize_window shorter
map cmd+shift+. resize_window wider
map cmd+shift+, resize_window narrower
map cmd+shift+backspace resize_window reset

# Tab management
map cmd+t new_tab
map cmd+shift+w close_tab
map cmd+shift+right next_tab
map cmd+shift+left previous_tab
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Layout management
map cmd+l next_layout
map cmd+shift+l previous_layout

# Font sizes
map cmd+equal     change_font_size all +1.0
map cmd+minus     change_font_size all -1.0
map cmd+0         change_font_size all 0

# Scrolling
map cmd+k clear_terminal scrollback active
map cmd+shift+k clear_terminal reset active
map cmd+up scroll_line_up
map cmd+down scroll_line_down
map cmd+page_up scroll_page_up
map cmd+page_down scroll_page_down
map cmd+home scroll_home
map cmd+end scroll_end

# Miscellaneous
map cmd+, edit_config_file
map cmd+shift+, load_config_file
map cmd+f launch --type=overlay --stdin-source=@screen_scrollback fzf --no-sort --no-mouse --exact -i

# Open URL in browser
map cmd+shift+o open_url_with_hints

# 2025 Enhancement: Transparency toggle
# Toggle background opacity on the fly for maximum/minimum transparency
map cmd+shift+a set_background_opacity +0.1
map cmd+shift+s set_background_opacity -0.1
map cmd+shift+d set_background_opacity default

# =============================================================================
# Advanced
# =============================================================================
editor nvim

# Keep window open after child process exits for error inspection
close_on_child_death no

# Remote control - enables CLI control and integrations
allow_remote_control yes
listen_on unix:/tmp/kitty

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 512

# Update check - stay current with latest features
update_check_interval 24

# =============================================================================
# Shell Integration
# =============================================================================
shell_integration no-cursor

# =============================================================================
