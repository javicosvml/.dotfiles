#
# Quick Reference - What Changed:
# ✨ Background transparency (93%) with blur (50)
# ✨ Dim inactive windows (75%)
# ✨ Smooth cursor blinking (550ms)
# ✨ Increased padding (12) for spacious feel
# ✨ Window margins (2) for split separation
# ✨ Fade tab bar style with smooth transitions
# ✨ Inactive text dimming (80%) for focus
# ✨ New transparency toggle shortcuts (cmd+shift+a/s/d)
# ✨ Window resize shortcuts
# ✨ Enhanced font rendering
# ✨ Confirm close to prevent accidents
#
# Customization Tips:
# 1. Transparency: Adjust background_opacity (0.85-1.0)
# 2. Blur: Adjust background_blur (30-80)
# 3. Padding: Adjust window_padding_width (8-20)
# 4. Dimming: Adjust dim_opacity (0.6-0.9)
# 5. Tab style: Change tab_bar_style (fade/powerline/separator)
# 6. Cursor: Change cursor_blink_interval (0 to disable, 400-800 for speed)
#
# Reload config: cmd+shift+,
# Edit config: cmd+,
# =============================================================================
